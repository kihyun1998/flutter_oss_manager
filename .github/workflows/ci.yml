name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pinned so CI does not drift with the runner's default Flutter.
env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # Generated *.g.dart files carry a tool-computed content-hash over their
      # exact bytes, so `dart format` must not touch them (it would invalidate
      # the hash). Format-check the hand-written sources only.
      - name: Format check
        run: dart format --output=none --set-exit-if-changed $(git ls-files '*.dart' ':!:*.g.dart')

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  example:
    name: Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # The example is a separate package (path-depends on this one); the root
      # job's analyze/test does not cover it, and its widget/use() tests are the
      # only ones that exercise the compiled generated code.
      - name: Install dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze
        working-directory: example
        run: flutter analyze

      - name: Test
        working-directory: example
        run: flutter test
